<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPost | AI News Validator</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="{{ url_for('static', filename='imageHandler.js') }}" defer></script>
</head>
<body>

<div class="page-wrapper">
    <header>
        <h1>VeriPost</h1>
        <p class="subtitle">AI-Driven Linguistic Integrity Analysis</p>
    </header>

    <main class="main-card">
        <div class="upload-section">
            <button type="button" class="secondary-btn" onclick="document.getElementById('imageInput').click()">
                Upload Image of News
            </button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImage(this)">
            <div id="ocrStatus"></div>
        </div>

        <textarea id="newsInput" placeholder="Paste a news headline or use the image uploader above..."></textarea>
        
        <button class="primary-btn" onclick="checkNews()">Analyze Validity</button>
        
        <div id="result"></div>
    </main>

    <footer>
        &copy; 2026 VeriPost Integrity Systems
    </footer>
</div>


</body>
</html>
