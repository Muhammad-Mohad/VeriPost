<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPost | AI News Validator</title>
    
    <link rel="icon" type="image/x-icon" href="https://via.placeholder.com/32x32.png?text=VP">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="page-wrapper">
    <header>
        <h1>VeriPost</h1>
        <p class="subtitle">AI-Driven Linguistic Integrity Analysis</p>
    </header>

    <main class="main-card">
        <div class="upload-section">
            <button type="button" class="secondary-btn" onclick="document.getElementById('imageInput').click()">
                Upload Image of News
            </button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImage(this)">
            <div id="ocrStatus"></div>
        </div>

        <textarea id="newsInput" placeholder="Paste a news headline or use the image uploader above..."></textarea>
        
        <button class="primary-btn" onclick="checkNews()">Analyze Validity</button>
        
        <div id="result"></div>
    </main>

    <footer>
        &copy; 2026 VeriPost Integrity Systems
    </footer>
</div>

<script>
    async function handleImage(input) {
        const file = input.files[0];
        const status = document.getElementById('ocrStatus');
        const textArea = document.getElementById('newsInput');
        
        if (!file) return;

        status.innerHTML = "Initializing OCR engine...";
        textArea.value = "";
        textArea.placeholder = "Reading text from image... please wait.";

        try {
            const result = await Tesseract.recognize(file, 'eng', {
                logger: m => {
                    if(m.status === 'recognizing text') {
                        status.innerHTML = `Scanning Image: ${Math.round(m.progress * 100)}%`;
                    }
                }
            });
            
            textArea.value = result.data.text.trim();
            status.innerHTML = "✅ Text extracted successfully!";
            textArea.placeholder = "Paste a news headline...";
        } catch (e) {
            status.innerHTML = "❌ Error reading image. Ensure text is clear.";
            console.error(e);
        }
    }

    async function checkNews() {
        const text = document.getElementById('newsInput').value;
        const resultDiv = document.getElementById('result');
        
        if (!text.trim()) {
            resultDiv.innerHTML = "<span style='color: #94a3b8;'>Please enter or extract some text first.</span>";
            return;
        }

        resultDiv.innerHTML = "<i>Analyzing linguistic patterns...</i>";

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();

            if (data.prediction) {
                const statusClass = data.prediction.toUpperCase(); 
                resultDiv.innerHTML = `
                    <div class="prediction-box ${statusClass}">
                        ${statusClass}
                    </div>
                    <span class="confidence">Linguistic Confidence Score: ${data.confidence_score}</span>
                `;
            } else {
                resultDiv.innerHTML = "Error: Backend processing failed.";
            }
        } catch (error) {
            resultDiv.innerHTML = "Server error. Is the Flask backend running?";
        }
    }
</script>

</body>
</html>
