<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPost Admin</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='admin.js') }}" defer></script>
</head>
<body>

<div class="page-wrapper">
    <header>
        <h1>VeriPost Admin</h1>
        <p class="subtitle">Model versioning &amp; retraining</p>
    </header>

    <main class="main-card">
        <div class="row gap">
            <input type="password" id="adminToken" placeholder="Admin token (if configured)" />
            <button class="secondary-btn" onclick="loadVersions()">Refresh</button>
        </div>

        <div id="currentMeta" class="meta-box"></div>

        <h3>Versions</h3>
        <div id="versionsList"></div>

        <h3>Retrain</h3>
        <div class="row gap">
            <input type="text" id="newVersion" placeholder="Optional version tag (e.g. v2)" />
            <button class="primary-btn" onclick="startRetrain()">Start Retrain</button>
        </div>
        <pre id="trainLog" class="log-box"></pre>

        <p><a href="/app">&larr; Back to app</a></p>
    </main>
</div>

</body>
</html>
